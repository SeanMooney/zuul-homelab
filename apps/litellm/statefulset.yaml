---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: litellm
  namespace: zuul-system
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: zuul-homelab
spec:
  serviceName: litellm
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/component: proxy
        app.kubernetes.io/part-of: zuul-homelab
    spec:
      initContainers:
      - name: seed-chatgpt-auth
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        args:
        - |
          set -eu
          mkdir -p /chatgpt
          if [ ! -s /chatgpt/auth.json ]; then
            cp /seed/auth.json /chatgpt/auth.json
            chmod 600 /chatgpt/auth.json
          fi
        volumeMounts:
        - name: chatgpt-auth-volume
          mountPath: /chatgpt
        - name: chatgpt-auth-seed
          mountPath: /seed
          readOnly: true
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm:v1.89.3
        imagePullPolicy: Always
        args:
        - "--config"
        - "/app/config.yaml"
        - "--port"
        - "4000"
        ports:
        - containerPort: 4000
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: litellm-keys
        env:
        - name: HOME
          value: "/tmp"
        - name: XDG_CACHE_HOME
          value: "/tmp"
        - name: CHATGPT_TOKEN_DIR
          value: "/var/lib/litellm/chatgpt"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PRISMA_BINARY_PATH
          value: "/tmp/.prisma"
        - name: PRISMA_CACHE_DIR
          value: "/tmp/.prisma-cache"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: cache-volume
          mountPath: /tmp
        - name: root-cache-volume
          mountPath: /.cache
        - name: chatgpt-auth-volume
          mountPath: /var/lib/litellm/chatgpt
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
        startupProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 20
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: config-volume
        configMap:
          name: litellm-config
      - name: cache-volume
        emptyDir: {}
      - name: root-cache-volume
        emptyDir: {}
      - name: chatgpt-auth-volume
        persistentVolumeClaim:
          claimName: litellm-chatgpt-auth
      - name: chatgpt-auth-seed
        secret:
          secretName: litellm-chatgpt-auth
