apiVersion: apps/v1
kind: Deployment
metadata:
  name: element-web
  namespace: matrix-system
  labels:
    app.kubernetes.io/name: element-web
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: element-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: element-web
        app.kubernetes.io/part-of: matrix
    spec:
      enableServiceLinks: false
      containers:
        - name: element-web
          image: vectorim/element-web:v1.12.17
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: element-config
