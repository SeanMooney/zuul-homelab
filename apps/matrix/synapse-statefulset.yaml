apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: synapse
  namespace: matrix-system
  labels:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
spec:
  serviceName: synapse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
        app.kubernetes.io/part-of: matrix
    spec:
      securityContext:
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
      initContainers:
        - name: generate-keys
          image: matrixdotorg/synapse:v1.152.0
          imagePullPolicy: Always
          command:
            - python
            - -m
            - synapse.app.homeserver
            - --config-path=/config/homeserver.yaml
            - --config-path=/secrets/homeserver-secrets.yaml
            - --generate-keys
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: data
              mountPath: /data
      containers:
        - name: synapse
          image: matrixdotorg/synapse:v1.152.0
          imagePullPolicy: Always
          args:
            - run
            - --config-path=/config/homeserver.yaml
            - --config-path=/secrets/homeserver-secrets.yaml
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: synapse-config
        - name: secrets
          secret:
            secretName: synapse-secrets
        - name: data
          persistentVolumeClaim:
            claimName: synapse-data
