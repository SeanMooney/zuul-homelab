---
# Matrix Synapse + Element Web
# Depends on: namespaces, certificates, database
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: matrix
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: namespaces
    - name: certificates
    - name: database
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/matrix
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
